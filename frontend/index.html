<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Nights at Fabron</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="camera-effects hidden" id="camera-effects">
        <div class="static-noise"></div>
        <div class="scanlines"></div>
        <div class="glitch-line"></div>
        <div class="vignette"></div>
    </div>

    <div id="temperature-ui" class="hidden">
        <div id="temp-label">SURCHAUFFE <span id="temp-percentage">0%</span></div>
        <div id="temp-bar-container">
            <div id="temp-bar-fill"></div>
        </div>
    </div>

    <main id="title-screen">
        <section class="menu-section">
            <h1 class="game-title">Five Nights<br>at Fabron</h1>
            <nav class="main-menu">
                <button id="btn-show-login" class="menu-btn">Connexion / Inscription</button>
                <button id="btn-new-game" class="menu-btn hidden">
                    <span id="btn-new-game-text">New Game</span><br>
                    <span id="btn-new-game-sub" class="menu-sub-text"></span>
                </button>
                <button id="btn-leaderboard" class="menu-btn">Leaderboard</button>
            </nav>

            <div class="player-stats hidden" id="player-stats-container">
                <p>Welcome back, <span id="player-name-display"></span>.</p>
                <p>Max Night: <span id="max-night-display">--</span></p>
                <p>Best Score: <span id="best-score-display">--</span></p>
                <button id="btn-logout" class="small-btn">Déconnexion</button>
            </div>

            <div class="version-info">
                <p>v 1.0.0</p>
                <p>&copy;2026 Projet Universitaire</p>
            </div>
        </section>

        <section class="characters-section">
            <img src="assets/banner_crous.png" alt="Banderole Crous" class="layer background-banner" id="banner-crous">
            <img src="assets/goldenfabron.png" alt="Goldenfabron" class="layer animatronic" id="animatronic-5">
            <img src="assets/oneeyed.png" alt="Oneeyed" class="layer animatronic" id="animatronic-4">
            <img src="assets/burncap.png" alt="Burncap" class="layer animatronic" id="animatronic-3">
            <img src="assets/redbear.png" alt="Redbear" class="layer animatronic" id="animatronic-2">
            <img src="assets/bluebear.png" alt="Bluebear" class="layer animatronic" id="animatronic-1">
        </section>
    </main>

    <main id="game-screen" class="hidden">
        <button id="btn-temp-die" class="dev-kill-btn">[DEV] Simuler Jumpscare</button>

        <img id="main-view-img" src="img/office/desk/desk_open.png" alt="Bureau" class="office-bg">
        
        <div id="door-left-zone" class="clickable-zone"></div>
        <div id="door-right-zone" class="clickable-zone"></div>
        <div id="window-zone" class="clickable-zone hidden"></div>
        
        <div class="hud-top-right">
            <div class="hud-time"><span id="in-game-hour">12</span> AM</div>
            <div class="hud-night">Night <span id="in-game-night">1</span></div>
        </div>

        <div class="bottom-controls" id="office-controls">
            <button id="btn-window" class="control-btn btn-white">Fenêtre</button>
            <button id="btn-camera" class="control-btn btn-red">Caméras</button>
        </div>
    </main>

    <main id="camera-system" class="hidden">
        <img id="cam-feed-img" src="" alt="Camera Feed" class="office-bg">
        
        <div id="cam-transition" class="hidden"></div>
        
        <button id="btn-open-server" class="control-btn btn-white hidden">Ouvrir Porte</button>
        
        <div id="minimap">
            <h3>PLAN DE L'IUT</h3>
            <div class="map-grid">
                
                <div class="room-box" style="left: 15%; top: 27%; width: 15%; height: 30%;"></div>
                <div class="room-label" style="left: 16%; top: 30%; text-align: center; width: 13%;">Bureau<br><span style="color:red; font-weight:bold;">YOU</span></div>

                <div class="room-box" style="left: 30%; top: 12%; width: 45%; height: 60%;"></div>
                
                <div class="room-divider" style="left: 45%; top: 12%; height: 60%;"></div>
                <div class="room-divider" style="left: 60%; top: 12%; height: 60%;"></div>

                <div class="room-label" style="left: 31%; top: 14%;">3ème Étage</div>
                <div class="room-label" style="left: 46%; top: 14%;">2ème Étage</div>
                <div class="room-label" style="left: 61%; top: 14%;">1ère Étage</div>

                <div class="room-box" style="left: 80%; top: 12%; width: 16%; height: 40%;"></div>
                <div class="room-label" style="left: 81%; top: 14%; font-size: 1rem; width: 14%; word-wrap: break-word;">Rez-de-chaussée</div>

                <div class="room-box" style="left: 30%; top: 86%; width: 24%; height: 12%;"></div>
                <div class="room-label" style="left: 30%; top: 89%; width: 24%; text-align: center;">CROUS</div>

                <div class="stair-h" style="left: 32%; top: 6%; width: 12%; height: 6%;"></div> 
                <div class="stair-h" style="left: 32%; top: 72%; width: 12%; height: 6%;"></div> 
                <div class="stair-h" style="left: 47%; top: 72%; width: 12%; height: 6%;"></div> 
                <div class="stair-h" style="left: 75%; top: 32%; width: 5%; height: 10%;"></div> 
                <div class="stair-v" style="left: 80%; top: 52%; width: 16%; height: 28%;"></div> 
                
                <div class="stair-h" style="left: 58%; top: 88%; width: 15%; height: 6%;"></div> 

                <button class="cam-btn" data-cam="ext_01" id="pos-ext1">EXT 1</button>
                <button class="cam-btn" data-cam="int_01" id="pos-int1">INT 1</button>
                <button class="cam-btn" data-cam="int_02" id="pos-int2">INT 2</button>
                <button class="cam-btn" data-cam="esc_01" id="pos-esc1">ESC 1</button>
                <button class="cam-btn" data-cam="int_03" id="pos-int3">INT 3</button>
                <button class="cam-btn" data-cam="esc_02" id="pos-esc2">ESC 2</button>
                <button class="cam-btn" data-cam="int_04" id="pos-int4">INT 4</button>
                <button class="cam-btn" data-cam="esc_03" id="pos-esc3">ESC 3</button>
                <button class="cam-btn" data-cam="int_05" id="pos-int5">INT 5</button>
                <button class="cam-btn" data-cam="ext_02" id="pos-ext2">EXT 2</button>
                <button class="cam-btn" data-cam="ext_03" id="pos-ext3">EXT 3</button>
            </div>
        </div>

        <div class="bottom-controls" style="z-index: 75;">
            <button id="btn-close-camera" class="control-btn btn-white" style="border-color: #aaa; color: #aaa;">Fermer Caméras</button>
        </div>
    </main>

    <main id="game-over-screen" class="hidden fullscreen-overlay">
        <h1 class="game-over-text">GAME OVER</h1>
        <button id="btn-return-menu-go" class="menu-btn">Retourner au menu</button>
    </main>

    <main id="victory-screen" class="hidden fullscreen-overlay">
        <div class="victory-clock">
            <div class="time-container">
                <div class="hours-roller-container">
                    <div class="hours-roller" id="hours-roller">
                        <div class="hour">5</div>
                        <div class="hour">6</div>
                    </div>
                </div>
                <div class="am">AM</div>
            </div>
        </div>
    </main>

    <div id="auth-modal" class="modal hidden">
        <div class="modal-content auth-content">
            <button id="btn-close-auth" class="close-btn">X</button>
            <h2>IDENTIFICATION</h2>
            <div class="auth-form">
                <input type="text" id="auth-username" placeholder="Nom du Gardien" autocomplete="off">
                <input type="password" id="auth-password" placeholder="Mot de passe">
                <div class="auth-buttons">
                    <button id="btn-submit-login" class="form-btn">Se Connecter</button>
                    <button id="btn-submit-register" class="form-btn">S'inscrire</button>
                </div>
                <p id="auth-message" class="error-msg"></p>
            </div>
        </div>
    </div>

    <div id="leaderboard-modal" class="modal hidden">
        <div class="modal-content">
            <button id="btn-close-leaderboard" class="close-btn">X</button>
            <h2>LEADERBOARD</h2>
            <table id="score-table">
                <thead><tr><th>Rang</th><th>Joueur</th><th>Score</th></tr></thead>
                <tbody id="score-body"></tbody>
            </table>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
